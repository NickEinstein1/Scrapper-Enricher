geocoding_task:
  description: >
    You are working on a School Data Enrichment project to complete missing information in our school database.

    TASK: Add geographic coordinates (latitude and longitude) to the schools from the scraping task by following these steps:
    1. For each school, check if it has address information from the scraping task
    2. Use the geocoding_tool with action="geocode" to obtain the coordinates
    3. Extract the latitude and longitude from the geocoding results
    4. Return the geocoded data in a structured format for the next task

    STEP-BY-STEP INSTRUCTIONS:
    1. First, examine the task context to find the schools that need geocoding
       - Look for the "previous_task_output" field which contains the results from the scraping task
       - Also check the "data" field which contains the original school data

    2. For each school:
       - Extract the school_id and school_name
       - Extract the address information (address, city, state, zip)
       - Format the address information for geocoding

    3. For each school with address information, use one of these two formats:
       - Option 1 (preferred):
         ```
         Action: geocoding_tool
         Action Input: {"action": "geocode", "address": "STREET ADDRESS", "city": "CITY", "state": "STATE", "zip_code": "ZIP"}
         ```
       - Option 2:
         ```
         Action: geocoding_tool
         Action Input: {"action": "geocode", "location": "FULL ADDRESS STRING"}
         ```

    4. After geocoding all schools, return a structured response including:
       - The school_id
       - The geocoded coordinates (latitude and longitude)
       - The status of the geocoding operation (success or error)

    CONTEXT:
    - The schools have been processed by the scraping task and may have updated address information
    - Accurate geocoding is critical for mapping and location-based analysis
    - The geocoding_tool returns coordinates in the format {"status": "success", "data": {"latitude": 30.267153, "longitude": -97.743057}}
    - The parameters must be strings, not JSON objects or dictionaries
    - If geocoding fails with the full address, try with just city and state

    IMPORTANT: You will receive the schools data from the previous tasks. You should use this data to determine which schools to geocode.
    DO NOT make up random school addresses. Use ONLY the schools provided in the task context.

    EXAMPLE TASK CONTEXT:
    ```
