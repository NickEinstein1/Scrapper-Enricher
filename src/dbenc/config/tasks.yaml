reporting_task:
  description: >
    You are working on a School Data Enrichment project to complete missing information in our school database.

    TASK: Update the database with the enriched school data and create a summary report by following these steps:
    1. Compile all the enriched data from the previous tasks (research, scraping, geocoding)
    2. Use supabase_tool with action="update_school" to update each school with the enriched data
    3. Prepare a summary report of the enrichment process

    STEP-BY-STEP INSTRUCTIONS:
    1. First, examine the task context to find the schools that need updating
       - Look for the "previous_task_output" field which contains the results from the geocoding task
       - Also check the "task_history" field which contains all previous task outputs
       - IMPORTANT: This data is already in your context - DO NOT try to use a tool to retrieve it

    2. For each school in the previous_task_output:
       - Extract the school_id
       - Collect all enriched data from the scraping and geocoding tasks
       - Validate the data according to the validation requirements below

    3. For each school with valid data:
       - Call the supabase_tool with action="update_school"
       - Include the school_id and the validated data
       - Use the EXACT format shown in the example below

    4. After updating all schools, create a summary report including:
       - Total number of schools processed
       - Number of successful updates
       - Number of failed updates
       - Details of any validation issues or errors

    CONTEXT:
    - The schools have been processed by the research, scraping, and geocoding tasks
    - Each school has a unique school_id (UUID format) which must be used for updates
    - The data must be validated before updating (e.g., reasonable enrollment numbers, valid coordinates)
    - The field names must exactly match the database schema columns
    - Update each school one at a time, not as a batch

    CRITICAL FORMATTING INSTRUCTIONS:
    - You MUST call the supabase_tool for EACH school that needs updating
    - The Action Input MUST be a valid JSON object with the EXACT format shown below:
      * You MUST use the "input_str" parameter
      * Inside the "input_str" value, include a JSON string with:
        * "action": "update_school" (always this exact string)
        * "school_id": The UUID of the school (e.g., "ee8981ae-7f29-47bf-968c-4829381e0559")
        * "data": An object containing ONLY the fields that need to be updated
    - The JSON must be properly formatted with double quotes around all keys and string values
    - All quotes inside the "input_str" value must be escaped with backslashes
    - Example of CORRECT format:
      ```
      Action: supabase_tool
      Action Input: {"input_str": "{\"action\": \"update_school\", \"school_id\": \"ee8981ae-7f29-47bf-968c-4829381e0559\", \"data\": {\"total_student_enrollment\": 115, \"latitude\": 35.153045, \"longitude\": -92.740309}}"}
      ```

    DATA VALIDATION REQUIREMENTS:
    - Validate all data before updating:
      * total_student_enrollment should be a positive integer (typically between 10 and 5000)
      * latitude should be between 24 and 50 (continental US)
      * longitude should be between -125 and -65 (continental US)
      * phone numbers should be in format (XXX) XXX-XXXX if present
    - Skip updating any field with invalid data and note it in your report

    IMPORTANT: You will receive the schools data from the previous tasks. You should use this data to update the database.
    DO NOT make up random school IDs or data. Use ONLY the schools and data provided in the task context.

    EXAMPLE TASK CONTEXT STRUCTURE:
    ```
    {
      "data": {
        "schools": [
          {
            "school_id": "ee8981ae-7f29-47bf-968c-4829381e0559",
            "school_name": "SACRED HEART CATHOLIC HIGH SCHOOL",
            ...
          }
        ]
      },
      "previous_task_output": [
        {
          "school_id": "ee8981ae-7f29-47bf-968c-4829381e0559",
          "enriched_fields": {
            "latitude": 35.153045,
            "longitude": -92.740309
          },
          "status": "success"
        }
      ],
      "task_history": [
        {
          "task": "research_task",
          "output": [...]
        },
        {
          "task": "scraping_task",
          "output": [...]
        },
        {
          "task": "geocoding_task",
          "output": [...]
        }
      ]
    }
    ```

