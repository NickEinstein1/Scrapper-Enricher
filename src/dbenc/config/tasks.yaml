# tasks.yaml
research_task:
  description: >
    You are working on a School Data Enrichment project to complete missing information in our school database.

    TASK: Identify schools that need data enrichment by following these steps:
    1. Use supabase_tool with action="get_schools" to retrieve up to 5 schools needing enrichment
       - EXACT SYNTAX:
         ```
         Action: supabase_tool
         Action Input: {"action": "get_schools", "limit": 5}
         ```
    2. For each school, check if any of these fields are missing: address, city, zip, total_student_enrollment, latitude, longitude
    3. Return a structured JSON list with school_id, school_name, and missing_fields

    CONTEXT:
    - The database contains both public and private schools across the United States
    - Schools may be missing various pieces of information that need to be filled in
    - The school_id is a UUID that uniquely identifies each school and must be preserved
    - This is the first step in our enrichment pipeline, so accuracy is critical
    - You will be working with real schools like "SACRED HEART CATHOLIC HIGH SCHOOL" and "LITTLE FISHERS PRESCHOOL"
    - The data you identify here will be used by other agents in subsequent tasks

    IMPORTANT: The schools data is provided to you in the task context. You do NOT need to call the supabase_tool to get schools.
    Instead, you should analyze the schools data that is already provided in your task context.

    EXAMPLE TASK CONTEXT:
    ```
    {
      "data": {
        "schools": [
          {
            "school_id": "ee8981ae-7f29-47bf-968c-4829381e0559",
            "school_name": "SACRED HEART CATHOLIC HIGH SCHOOL",
            "address": "106 N. St. Joseph",
            "city": "Morrilton",
            "zip": 72110,
            "total_student_enrollment": null,
            "latitude": null,
            "longitude": null
          },
          {
            "school_id": "e6595f1f-fe60-4678-8d75-fadc940c1945",
            "school_name": "LITTLE FISHERS PRESCHOOL",
            "address": "2011 AUSTIN PKWY",
            "city": "SUGAR LAND",
            "zip": 77479,
            "total_student_enrollment": null,
            "latitude": null,
            "longitude": null
          }
        ]
      }
    }
    ```

    EXAMPLE RESPONSE:
    ```
    [
      {
        "school_id": "ee8981ae-7f29-47bf-968c-4829381e0559",
        "school_name": "SACRED HEART CATHOLIC HIGH SCHOOL",
        "missing_fields": ["total_student_enrollment", "latitude", "longitude"]
      },
      {
        "school_id": "e6595f1f-fe60-4678-8d75-fadc940c1945",
        "school_name": "LITTLE FISHERS PRESCHOOL",
        "missing_fields": ["total_student_enrollment", "latitude", "longitude"]
      }
    ]
    ```
  expected_output: >
    A JSON list of schools that need enrichment, with each school containing its UUID, name, and list of missing fields.
    Example: [
      {
        "school_id": "ee8981ae-7f29-47bf-968c-4829381e0559",
        "school_name": "SACRED HEART CATHOLIC HIGH SCHOOL",
        "missing_fields": ["total_student_enrollment", "latitude", "longitude"]
      }
    ]
  agent: researcher

scraping_task:
  description: >
    You are working on a School Data Enrichment project to complete missing information in our school database.

    TASK: Scrape data for the schools identified in the research task by following these steps:
    1. Determine if each school is private or public based on its name
       - Private schools often have religious terms (Christian, Catholic, Lutheran, etc.)
       - Public schools often have terms like Elementary, Middle, High School, etc.

    2. Use the appropriate scraping_tool action:
       - For private schools:
         ```
         Action: scraping_tool
         Action Input: {"action": "scrape_private", "school_name": "SCHOOL NAME", "city": "CITY", "state": "STATE"}
         ```
       - For public schools:
         ```
         Action: scraping_tool
         Action Input: {"action": "scrape_public", "school_name": "SCHOOL NAME", "city": "CITY", "state": "STATE"}
         ```

    3. Extract these fields to match our database schema: total_student_enrollment, address, city, zip, phone, school_type, religious_orientation, days_in_school_year

    CONTEXT:
    - The schools were identified in the previous research task as needing enrichment
    - We use privateschoolreview.com for private schools and publicschoolreview.com for public schools
    - The school_name parameter must be a string, not a JSON object or dictionary
    - If the first attempt fails, try variations of the school name (remove special characters, try abbreviations)

    IMPORTANT: You will receive the schools data from the previous task. You should use this data to determine which schools to scrape.
    DO NOT make up random school names. Use ONLY the schools provided in the task context.

    EXAMPLE TASK CONTEXT:
    ```
    {
      "data": {
        "schools": [
          {
            "school_id": "ee8981ae-7f29-47bf-968c-4829381e0559",
            "school_name": "SACRED HEART CATHOLIC HIGH SCHOOL",
            "address": "106 N. St. Joseph",
            "city": "Morrilton",
            "state": "AR",
            "zip": 72110,
            "missing_fields": ["total_student_enrollment", "latitude", "longitude"]
          },
          {
            "school_id": "e6595f1f-fe60-4678-8d75-fadc940c1945",
            "school_name": "LITTLE FISHERS PRESCHOOL",
            "address": "2011 AUSTIN PKWY",
            "city": "SUGAR LAND",
            "state": "TX",
            "zip": 77479,
            "missing_fields": ["total_student_enrollment", "latitude", "longitude"]
          }
        ]
      },
      "previous_task_output": [
        {
          "school_id": "ee8981ae-7f29-47bf-968c-4829381e0559",
          "school_name": "SACRED HEART CATHOLIC HIGH SCHOOL",
          "missing_fields": ["total_student_enrollment", "latitude", "longitude"]
        },
        {
          "school_id": "e6595f1f-fe60-4678-8d75-fadc940c1945",
          "school_name": "LITTLE FISHERS PRESCHOOL",
          "missing_fields": ["total_student_enrollment", "latitude", "longitude"]
        }
      ]
    }
    ```

    EXAMPLE ACTIONS:
    ```
    Action: scraping_tool
    Action Input: {"action": "scrape_private", "school_name": "SACRED HEART CATHOLIC HIGH SCHOOL", "city": "Morrilton", "state": "AR"}
    ```

    ```
    Action: scraping_tool
    Action Input: {"action": "scrape_private", "school_name": "LITTLE FISHERS PRESCHOOL", "city": "SUGAR LAND", "state": "TX"}
    ```

    EXAMPLE RESPONSE:
    ```
    [
      {
        "school_id": "ee8981ae-7f29-47bf-968c-4829381e0559",
        "enriched_fields": {
          "total_student_enrollment": 115,
          "address": "106 N. St. Joseph",
          "city": "Morrilton",
          "state": "AR",
          "zip": 72110,
          "phone": "(501) 354-4821",
          "school_type": "REGULAR ELEMENTARY OR SECONDARY",
          "religious_orientation": "Catholic"
        },
        "status": "success"
      },
      {
        "school_id": "e6595f1f-fe60-4678-8d75-fadc940c1945",
        "enriched_fields": {
          "total_student_enrollment": 85,
          "address": "2011 AUSTIN PKWY",
          "city": "SUGAR LAND",
          "state": "TX",
          "zip": 77479,
          "phone": "(281) 565-1222",
          "school_type": "REGULAR ELEMENTARY OR SECONDARY",
          "religious_orientation": "Christian"
        },
        "status": "success"
      }
    ]
    ```
  expected_output: >
    A JSON list of updated school data with enriched fields for each school.
    Example: [
      {
        "school_id": "ee8981ae-7f29-47bf-968c-4829381e0559",
        "enriched_fields": {
          "total_student_enrollment": 115,
          "address": "106 N. St. Joseph",
          "city": "Morrilton",
          "state": "AR",
